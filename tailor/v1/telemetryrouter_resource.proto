syntax = "proto3";

package tailor.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "tailor/v1/secret_manager_resource.proto";

message TelemetryExport {
  string name = 1 [(buf.validate.field).string.pattern = "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"];
  bool enabled = 2;
  string endpoint = 3 [(buf.validate.field).string.min_len = 1];
  TelemetryExportProtocol protocol = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  map<string, string> headers = 5;
  TelemetryExportAuthConfig auth = 6;
  TracesConfig traces = 7;
  MetricsConfig metrics = 8;
  LogsConfig logs = 9;
  google.protobuf.Timestamp created_at = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 11 [(google.api.field_behavior) = OUTPUT_ONLY];
  reserved 12;
}

message TracesConfig {
  bool enabled = 1;
}

message MetricsConfig {
  bool enabled = 1;
}

message LogsConfig {
  bool enabled = 1;
}

enum TelemetryExportProtocol {
  TELEMETRY_EXPORT_PROTOCOL_UNSPECIFIED = 0;
  TELEMETRY_EXPORT_PROTOCOL_GRPC = 1;
  TELEMETRY_EXPORT_PROTOCOL_HTTP = 2;
}

message TelemetryExportAuthConfig {
  oneof method {
    TelemetryExportApiKeyAuth api_key = 1;
    TelemetryExportBearerTokenAuth bearer_token = 2;
  }
}

message TelemetryExportApiKeyAuth {
  string header_name = 1 [(buf.validate.field).string.min_len = 1];
  SecretValue secret_value = 2 [(buf.validate.field).required = true];
}

message TelemetryExportBearerTokenAuth {
  SecretValue secret_value = 1 [(buf.validate.field).required = true];
}

// ResourceAttributesConfig is a workspace-level singleton that controls
// the resource attributes enriched onto outgoing telemetry signals.
message ResourceAttributesConfig {
  // Developer-specified prefix prepended to each microservice's own
  // service.name (e.g. "gateway", "tailordb") to form the final
  // service.name resource attribute on outgoing signals:
  // "<service_name_prefix>-<service.name>".
  string service_name_prefix = 1 [(buf.validate.field).string.pattern = "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"];
  // Customer-side deployment environment (e.g. "production", "staging").
  // Optional; when empty, the enricher leaves deployment.environment.name
  // untouched. Follows OTel semconv `deployment.environment.name` semantics
  // (free-form string; max 256 chars).
  string deployment_environment_name = 2 [(buf.validate.field).string.max_len = 256];
  google.protobuf.Timestamp created_at = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}
