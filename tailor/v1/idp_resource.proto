syntax = "proto3";

package tailor.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/struct.proto";
import "tailor/v1/resource.proto";

message IdPService {
  Namespace namespace = 1;
  string authorization = 2;
  string provider_url = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  IdPUserAuthPolicy user_auth_policy = 4;
  // lang is the IETF BCP 47 language subtag.
  IdPLang lang = 5;
  // publish_user_events indicates whether user lifecycle events (created, updated, deleted) are enabled.
  // When enabled, events are published to the dataplane event topic.
  bool publish_user_events = 6;
  IdPDisableGqlOperations disable_gql_operations = 7;
  IdPEmailConfig email_config = 8;
  IdPPermission permission = 9;
}

// IdPPermission defines per-operation permission policies for IDP namespaces.
message IdPPermission {
  repeated IdPPermissionPolicy create = 1;
  repeated IdPPermissionPolicy read = 2;
  repeated IdPPermissionPolicy update = 3;
  repeated IdPPermissionPolicy delete = 4;
  repeated IdPPermissionPolicy send_password_reset_email = 5;
  // unenroll_mfa policies guard the dataplane MFA-unenroll mutation, which
  // removes a single enrolled MFA factor from a user.
  repeated IdPPermissionPolicy unenroll_mfa = 6;
}

message IdPPermissionPolicy {
  repeated IdPPermissionCondition conditions = 1;
  IdPPermissionPermit permit = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  optional string description = 3;
}

message IdPPermissionCondition {
  IdPPermissionOperand left = 1 [(buf.validate.field).required = true];
  IdPPermissionOperator operator = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  IdPPermissionOperand right = 3 [(buf.validate.field).required = true];
}

message IdPPermissionOperand {
  oneof kind {
    option (buf.validate.oneof).required = true;
    string user_field = 1 [(buf.validate.field).string = {min_len: 1}];
    string idp_user_field = 2 [(buf.validate.field).string = {min_len: 1}];
    string old_idp_user_field = 3 [(buf.validate.field).string = {min_len: 1}];
    string new_idp_user_field = 4 [(buf.validate.field).string = {min_len: 1}];
    google.protobuf.Value value = 5;
  }
}

enum IdPPermissionOperator {
  ID_P_PERMISSION_OPERATOR_UNSPECIFIED = 0;
  ID_P_PERMISSION_OPERATOR_EQ = 1;
  ID_P_PERMISSION_OPERATOR_NE = 2;
  ID_P_PERMISSION_OPERATOR_IN = 3;
  ID_P_PERMISSION_OPERATOR_NIN = 4;
}

enum IdPPermissionPermit {
  ID_P_PERMISSION_PERMIT_UNSPECIFIED = 0;
  ID_P_PERMISSION_PERMIT_ALLOW = 1;
  ID_P_PERMISSION_PERMIT_DENY = 2;
}

// IdPDisableGqlOperations controls which IdP-related GraphQL operations are disabled.
message IdPDisableGqlOperations {
  // create disables the _createUser GraphQL mutation.
  bool create = 1;
  // update disables the _updateUser GraphQL mutation.
  bool update = 2;
  // delete disables the _deleteUser GraphQL mutation.
  bool delete = 3;
  // read disables the _users and _user GraphQL queries.
  bool read = 4;
  // send_password_reset_email disables the _sendPasswordResetEmail GraphQL mutation.
  bool send_password_reset_email = 5;
  // request_mfa_settings_url disables the _requestMfaSettingsUrl GraphQL query.
  bool request_mfa_settings_url = 6;
  // unenroll_mfa disables the _unenrollMfa GraphQL mutation.
  bool unenroll_mfa = 7;
}

// IdPLang represents the IETF BCP 47 language subtag.
enum IdPLang {
  ID_P_LANG_UNSPECIFIED = 0;
  ID_P_LANG_EN = 1;
  ID_P_LANG_JA = 2;
}

// IdPEmailConfig holds namespace-level email configuration defaults.
message IdPEmailConfig {
  // from_name is the default sender display name for emails. Empty means use mailer default.
  string from_name = 1 [(buf.validate.field).string = {
    max_len: 200
    pattern: "^[^\\r\\n]*$"
  }];
  // password_reset_subject is the default subject for password reset emails. Empty means use localized default.
  string password_reset_subject = 2 [(buf.validate.field).string = {
    max_len: 200
    pattern: "^[^\\r\\n]*$"
  }];
}

message IdPClient {
  string name = 1;
  string client_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string client_secret = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message IdPUserAuthPolicy {
  option (buf.validate.message).cel = {
    id: "password_length_consistency"
    message: "password_min_length must be less than or equal to password_max_length"
    // Always validate using effective values (use default 6 for min, 4096 for max if unset)
    expression: "(this.password_min_length == 0 ? 6 : this.password_min_length) <= (this.password_max_length == 0 ? 4096 : this.password_max_length)"
  };
  option (buf.validate.message).cel = {
    id: "allowed_email_domains_requires_email_identifier"
    message: "allowed_email_domains cannot be set when use_non_email_identifier is true"
    expression: "this.allowed_email_domains.size() == 0 || !this.use_non_email_identifier"
  };
  option (buf.validate.message).cel = {
    id: "allow_google_oauth_requires_email_identifier"
    message: "allow_google_oauth cannot be enabled when use_non_email_identifier is true"
    expression: "!this.allow_google_oauth || !this.use_non_email_identifier"
  };
  option (buf.validate.message).cel = {
    id: "allow_google_oauth_requires_allowed_email_domains"
    message: "allowed_email_domains must be set when allow_google_oauth is true"
    expression: "!this.allow_google_oauth || this.allowed_email_domains.size() > 0"
  };
  option (buf.validate.message).cel = {
    id: "allow_microsoft_oauth_requires_email_identifier"
    message: "allow_microsoft_oauth cannot be enabled when use_non_email_identifier is true"
    expression: "!this.allow_microsoft_oauth || !this.use_non_email_identifier"
  };
  option (buf.validate.message).cel = {
    id: "allow_microsoft_oauth_requires_disable_password_auth"
    message: "allow_microsoft_oauth requires disable_password_auth to be enabled"
    expression: "!this.allow_microsoft_oauth || this.disable_password_auth"
  };
  option (buf.validate.message).cel = {
    id: "allow_microsoft_oauth_requires_allowed_email_domains"
    message: "allowed_email_domains must be set when allow_microsoft_oauth is true"
    expression: "!this.allow_microsoft_oauth || this.allowed_email_domains.size() > 0"
  };
  option (buf.validate.message).cel = {
    id: "disable_password_auth_requires_oauth"
    message: "disable_password_auth requires allow_google_oauth or allow_microsoft_oauth to be enabled"
    expression: "!this.disable_password_auth || this.allow_google_oauth || this.allow_microsoft_oauth"
  };
  option (buf.validate.message).cel = {
    id: "disable_password_auth_conflicts_with_self_password_reset"
    message: "allow_self_password_reset cannot be enabled when disable_password_auth is true"
    expression: "!this.disable_password_auth || !this.allow_self_password_reset"
  };
  option (buf.validate.message).cel = {
    id: "require_mfa_requires_enable_mfa"
    message: "require_mfa requires enable_mfa to be enabled"
    expression: "!this.require_mfa || this.enable_mfa"
  };
  option (buf.validate.message).cel = {
    id: "enable_mfa_requires_allowed_return_origins"
    message: "enable_mfa requires allowed_return_origins to list at least one origin so /mfa/settings has a valid return target"
    expression: "!this.enable_mfa || this.allowed_return_origins.size() > 0"
  };

  bool use_non_email_identifier = 1;
  bool allow_self_password_reset = 2;
  // Password policy fields (stored in Identity Platform, not in DB)
  bool password_require_uppercase = 3;
  bool password_require_lowercase = 4;
  bool password_require_non_alphanumeric = 5;
  bool password_require_numeric = 6;
  // password_min_length: valid range is 6-30 (default: 6). When 0 (unset), uses default value 6.
  int32 password_min_length = 7 [(buf.validate.field).cel = {
    id: "password_min_length_range"
    message: "password_min_length must be 0 (default) or between 6 and 30"
    expression: "this == 0 || (this >= 6 && this <= 30)"
  }];
  // password_max_length: valid range is 6-4096 (default: 4096). When 0 (unset), uses default value 4096.
  int32 password_max_length = 8 [(buf.validate.field).cel = {
    id: "password_max_length_range"
    message: "password_max_length must be 0 (default) or between 6 and 4096"
    expression: "this == 0 || (this >= 6 && this <= 4096)"
  }];
  // List of allowed email domains (e.g., ["example.com", "corp.example.com"])
  // Empty list means all domains are allowed (backward compatible)
  // Cannot be set when use_non_email_identifier is true
  repeated string allowed_email_domains = 9 [(buf.validate.field).repeated = {
    unique: true
    max_items: 100
    items: {string: {hostname: true}}
  }];
  // allow_google_oauth enables "Sign in with Google" for this namespace.
  // When enabled, users can authenticate using their Google account.
  // Cannot be enabled when use_non_email_identifier is true.
  // Requires allowed_email_domains to be set.
  bool allow_google_oauth = 10;
  // disable_password_auth disables password-based authentication for this namespace.
  // When enabled, users cannot sign in or reset their password using email/password.
  // Requires allow_google_oauth or allow_microsoft_oauth to be enabled.
  // Cannot be used with allow_self_password_reset.
  bool disable_password_auth = 11;
  // allow_microsoft_oauth enables "Sign in with Microsoft" for this namespace.
  // Requires disable_password_auth to be true.
  // Cannot be enabled when use_non_email_identifier is true.
  bool allow_microsoft_oauth = 12;
  // enable_mfa makes TOTP MFA available for users in this namespace. When true the
  // Identity Platform tenant has mfaConfig.State=ENABLED. When false, MFA cannot
  // be enrolled or challenged regardless of require_mfa.
  bool enable_mfa = 13;
  // require_mfa enforces TOTP MFA enrollment and challenge for password-authenticated
  // users in this namespace. OAuth (Google/Microsoft) sign-in is not affected.
  // Requires enable_mfa to be true.
  bool require_mfa = 14;
  // allowed_return_origins lists application origins (e.g. "https://app.example.com")
  // that the IdP is allowed to redirect users back to from self-service pages such
  // as /mfa/settings. This is intentionally separate from OIDC redirect_uri, and
  // covers the general case of "send the user back to the app after an action in
  // the IdP UI". Each entry must be an origin (RFC 6454, scheme + host + optional
  // port, no path, query, or fragment). The caller's returnTo URL may freely
  // include a path and query; the matcher extracts its origin and compares against
  // this list.
  //
  // The per-item pattern is stricter than RFC 6454 by design:
  //   - host must match [a-zA-Z0-9.-]+ (DNS-friendly), so IPv6 literals
  //     (http://[::1]) and underscores in hostnames are not accepted
  //   - only http and https schemes are allowed
  //   - path / query / fragment are rejected, since matching is origin-only
  repeated string allowed_return_origins = 15 [(buf.validate.field).repeated = {
    unique: true
    max_items: 50
    items: {
      string: {
        pattern: "^https?://[a-zA-Z0-9.-]+(:[0-9]+)?$"
        max_len: 253
      }
    }
  }];
  // mfa_issuer is the label shown next to the user account in authenticator apps
  // (Google Authenticator, 1Password, etc.) when TOTP is enrolled. When empty the
  // server falls back to "Tailor Platform IdP".
  string mfa_issuer = 16 [(buf.validate.field).string.max_len = 64];
}
